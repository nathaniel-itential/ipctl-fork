---
version: 2

before:
  hooks:
    - make clean
    - go mod tidy

snapshot:
  version_template: "{{ incpatch .Version }}-next"

builds:
  - id: default
    main: ./cmd/ipctl
    binary: ipctl
    ldflags:
      - -s -w
      - -X github.com/itential/ipctl/internal/app.Build={{ .Env.BUILD }}
      - -X github.com/itential/ipctl/internal/app.Version={{ .Tag }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}-
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - NOTICE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch

homebrew_casks:
 - name: ipctl
   binaries:
     - ipctl
   repository:
     owner: nathaniel-itential
     name: homebrew-tap-test
     token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
   directory: Casks
   homepage: https://github.com/itential/ipctl
   description: "A powerful command-line interface for managing Itential Platform servers"
